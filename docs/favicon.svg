<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#020810"/>
    </radialGradient>
    <radialGradient id="hole" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000005"/>
      <stop offset="70%" stop-color="#000510"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>
  <circle cx="32" cy="30" r="12" fill="url(#hole)"/>
  <ellipse cx="32" cy="30" rx="18" ry="16" fill="none" stroke="#00cfff" stroke-width="1.8" filter="url(#glow-strong)" opacity="0.9"/>
  <ellipse cx="32" cy="30" rx="18" ry="16" fill="none" stroke="#40e8ff" stroke-width="0.8" opacity="0.7"/>
  <ellipse cx="32" cy="30" rx="15" ry="13" fill="none" stroke="#0090cc" stroke-width="0.5" opacity="0.4"/>
</svg>
