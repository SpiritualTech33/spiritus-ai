<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiritus AI | Consciencia & Código</title>
    <style>
        /* Definición de variables para Claridad (ZenCode Principle I) */
        :root {
            --bg-color: #0a0a0c;
            --text-main: #ffffff;
            --text-dim: #888888;
            --accent: #58a6ff;
            --border-color: #222222;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Contenedor principal: El Código debe respirar (Principio IV) */
        .zen-container {
            text-align: center;
            max-width: 600px;
            padding: 40px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        h1 {
            font-weight: 200;
            letter-spacing: 12px;
            text-transform: uppercase;
            margin-bottom: 24px;
            color: var(--accent);
        }

        /* La frase del espíritu */
        .philosophical-phrase {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: var(--text-main);
            margin-bottom: 32px;
            opacity: 0.9;
        }

        .status-tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-dim);
            padding: 8px 16px;
            border-top: 1px solid var(--border-color);
            display: inline-block;
        }

        /* Animación sutil de respiración */
        .fade-in {
            animation: fadeIn 3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <main class="zen-container fade-in">
        <h1>Spiritus AI</h1>
        
        <p class="philosophical-phrase">
            "The Spirit Exists Beyond The Form"
        </p>

        <div class="status-tag">
            SOPHIA Framework: Alpha Phase
        </div>
    </main>

</body>
</html>
