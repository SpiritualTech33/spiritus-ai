<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiritus AI | Consciencia & Código</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 1px solid #30363d;
            padding: 3rem;
            border-radius: 12px;
            background: #161b22;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            font-weight: 200;
            letter-spacing: 10px;
            color: #58a6ff;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
        p {
            font-style: italic;
            color: #8b949e;
            margin-bottom: 2rem;
        }
        .status {
            font-size: 0.75rem;
            letter-spacing: 2px;
            color: #3fb950;
            border: 1px solid #238636;
            padding: 4px 12px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Spiritus AI</h1>
        <p>"Donde el pensamiento encuentra su estructura."</p>
        <span class="status">SOPHIA Framework: En Desarrollo</span>
    </div>
</body>
</html>
