<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spiritus AI - SOPHIA</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050508;
            --text-main: #f0f0f5;
            --accent: #58a6ff;
        }

        /* --- ESTILO (CSS) --- */
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Space Mono', monospace;
            
            /* Esto centra todo en la pantalla */
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;     
            
            min-height: 100vh; /* Ocupa el 100% de la altura de la pantalla */
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .sophia-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .sophia-image {
            max-width: 80%; /* Ajustado para que se vea bien en celulares */
            height: auto;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(88, 166, 255, 0.3);
            animation: breatheGlow 4s ease-in-out infinite;
        }

        .philosophical-phrase {
            font-size: 1.2rem;
            margin-top: 30px;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(88, 166, 255, 0.5);
        }

        @keyframes breatheGlow {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.02); opacity: 1; }
        }
    </style>
</head>
<body>

    <main class="sophia-display">
        <img src="image.png" alt="SOPHIA" class="sophia-image"> 
        
        <p class="philosophical-phrase">
            “Spirit Exists Beyond Form”
        </p>
    </main>

</body>
</html>
